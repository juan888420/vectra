name: Feature request
description: Propose a new feature or improvement for Vectra
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: phase
    attributes:
      label: Related phase
      description: Which development phase does this belong to?
      options:
        - Architecture
        - UI Design
        - Database
        - Auth
        - CRUD
        - Dashboard
        - Analytics
        - Predictions
        - Optimization
        - Deploy
        - Not sure
    validations:
      required: false
